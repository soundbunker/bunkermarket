<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>주문 · 벙커마켓</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="nav">
  <div class="wrap">
    <a class="brand" href="index.html"><span class="dot"></span>벙커마켓</a>
    <nav><a href="catalog.html">마켓</a><a class="cart-btn" href="#">🛒 장바구니</a></nav>
  </div>
</header>

<main class="wrap" style="padding:40px 22px 70px;max-width:820px">
  <h1 class="serif" style="font-size:32px">주문하기</h1>
  <p class="muted" style="margin:6px 0 26px">주문 접수 후 <b>계좌 정보와 수령 방법</b>을 문자로 안내드려요. (마르셰 장터 현장 수령 가능)</p>

  <div style="display:grid;grid-template-columns:1.1fr .9fr;gap:30px;align-items:start" id="cols">
    <!-- 주문 요약 -->
    <div>
      <h3 class="serif" style="font-size:20px;margin-bottom:14px">주문 내역</h3>
      <div id="summary"></div>
      <div style="display:flex;justify-content:space-between;margin-top:16px;padding-top:16px;border-top:1.5px solid var(--line);font-size:18px">
        <span>합계</span><b class="serif" id="total" style="font-size:22px"></b>
      </div>
    </div>

    <!-- 주문자 정보 -->
    <form class="form-card" id="orderForm">
      <label>받는 분</label><input required name="name" placeholder="성함">
      <label>연락처 (문자 안내)</label><input required name="phone" placeholder="010-0000-0000">
      <label>수령 방법</label>
      <select name="method" style="width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit">
        <option>택배 수령</option><option>마르셰 장터 현장 수령</option>
      </select>
      <label>주소 / 메모</label><textarea name="addr" rows="2" placeholder="택배 주소 또는 현장 수령 메모"></textarea>
      <button class="btn btn-accent" style="margin-top:18px;width:100%" id="submit">주문 접수</button>
    </form>
  </div>
</main>

<footer class="site"><div class="wrap">
  <div class="col"><div class="brand" style="font-size:20px"><span class="dot" style="background:var(--tide-lite);box-shadow:none"></span> 벙커마켓</div></div>
</div></footer>

<script src="js/data.js"></script>
<script src="js/ocean.js"></script>
<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script>
  function draw(){
    const items = Store.detailed();
    const sum = document.getElementById('summary');
    if(!items.length){
      sum.innerHTML = `<p class="muted">장바구니가 비어 있어요. <a href="catalog.html">마켓으로</a></p>`;
      document.getElementById('orderForm').style.display='none';
    } else {
      sum.innerHTML = items.map(i=>{
        const s=U.soundById(i.soundId);
        return `<div class="ci" style="padding:12px 0;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center">
          <div class="ic" style="width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;background:${U.grad(s.tone.hue)}">${U.emoji(i)}</div>
          <div style="flex:1"><b>${i.title}</b><div class="muted" style="font-size:13px">${i.unit} · ${i.qty}개</div></div>
          <div>${U.krw(i.price*i.qty)}</div></div>`;
      }).join('');
    }
    document.getElementById('total').textContent = U.krw(Store.total());
  }
  draw();
  Store.onChange(draw);

  document.getElementById('orderForm').onsubmit=(e)=>{
    e.preventDefault();
    const f=new FormData(e.target);
    // MVP: 실제 PG 연동 지점. 지금은 접수 확인 → 문자 안내 플로우.
    const order = { name:f.get('name'), phone:f.get('phone'),
      method:f.get('method'), addr:f.get('addr'),
      items:Store.detailed().map(i=>({id:i.id,qty:i.qty})), total:Store.total() };
    console.log('ORDER', order);   // 여기서 서버/구글폼/스프레드시트로 전송하면 됨
    Store.clear();
    document.querySelector('main').innerHTML = `
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:56px">🌊</div>
        <h1 class="serif" style="font-size:30px;margin:14px 0 8px">주문이 접수되었어요</h1>
        <p class="muted">${order.name}님, 입력하신 번호로<br>계좌 정보와 수령 안내를 문자로 보내드릴게요.</p>
        <a class="btn btn-accent" href="catalog.html" style="margin-top:24px">마켓 더 둘러보기</a>
      </div>`;
  };
</script>
</body>
</html>
