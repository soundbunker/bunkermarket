<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'">
<title>소리 · 벙커마켓</title>
<meta name="description" content="NFC 카드를 태그하면 이 바다의 소리가 흐릅니다. 그 소리가 흐르는 바닷가에서 자란 것들을 만나보세요.">
<!-- 공유 미리보기 (카카오톡·문자·SNS). 개별 소리별 이미지는 og.png 준비 후 교체 -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="벙커마켓">
<meta property="og:title" content="벙커마켓 · 바다 소리를 태그하다">
<meta property="og:description" content="NFC 카드를 태그하면 바다의 소리가 흐르고, 그 소리가 흐르는 바닷가의 것들을 만납니다.">
<meta property="og:image" content="https://soundbunker.github.io/bunkermarket/assets/og.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="nav">
  <div class="wrap">
    <a class="brand" href="index.html"><span class="dot"></span>벙커마켓</a>
    <nav>
      <a href="index.html#sounds">소리</a>
      <a href="catalog.html">마켓</a>
      <a href="nfc.html">NFC 카드</a>
    </nav>
  </div>
</header>

<main id="app"><!-- 렌더 --></main>

<footer class="site"><div class="wrap">
  <div class="col"><div class="brand" style="font-size:20px"><span class="dot" style="background:var(--tide-lite);box-shadow:none"></span> 벙커마켓</div>
    <p style="font-size:14px">소리가 흐르는 곳.</p></div>
  <div class="col"><h4>마켓</h4><a href="catalog.html">전체 상품</a><a href="nfc.html">NFC 카드</a></div>
  <div class="col"><h4>문의</h4><a href="mailto:play@soundb.kr">play@soundb.kr</a></div>
</div></footer>

<script src="js/data.js"></script>
<script src="js/ocean.js"></script>
<script src="js/app.js"></script>
<script>
  const s = U.soundById(U.qs('s'));
  const app = document.getElementById('app');

  if(!s){
    app.innerHTML = `<div class="wrap" style="padding:90px 22px;text-align:center">
      <h1 class="serif" style="font-size:32px">소리를 찾을 수 없어요</h1>
      <p class="muted" style="margin:12px 0 24px">NFC 카드를 다시 태그하거나 소리 목록에서 골라주세요.</p>
      <a class="btn btn-accent" href="index.html#sounds">소리 목록 보기</a></div>`;
  } else {
    document.title = `${s.title} · 벙커마켓`;
    const items = U.listingsForSound(s.id);
    const fromTag = U.qs('autoplay') === '1';   // NFC 카드로 들어온 손님

    // 히어로
    const hero = document.createElement('section');
    hero.className='detail-hero';
    hero.style.background = U.grad(s.tone.hue);
    hero.innerHTML = `
      <svg class="wave-bg" viewBox="0 0 1440 400" preserveAspectRatio="none">
        <path fill="#fff" opacity=".08" d="M0,240 C300,320 560,160 820,220 C1080,280 1240,200 1440,250 L1440,400 L0,400 Z"/>
      </svg>
      <div class="wrap">
        <div class="code">${s.code}${fromTag ? ' · 📡 카드 태그 완료' : ''}</div>
        ${fromTag ? `<p style="margin:10px 0 2px;font-size:16px;color:rgba(255,255,255,.9)">카드를 대셨네요 — 여기는 <b>${s.region.spot}</b>의 소리 페이지예요.</p>` : ''}
        <h1>${s.title}</h1>
        <div class="spot">${s.region.country} · ${s.region.area} · ${s.region.spot}</div>
        <div class="player" id="player">
          <button class="big-play" id="bigPlay" aria-label="재생">▶</button>
          <div class="wavebar">${'<i></i>'.repeat(28)}</div>
          <div class="meta"><b>지금 듣기</b><br><span class="muted" style="color:rgba(255,255,255,.7)">${s.recordedAt} 녹음</span></div>
        </div>
        <p class="story">${s.story}</p>
        ${fromTag ? `<div style="margin-top:18px;display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:9px 16px;font-size:13.5px">🎴 <b>${s.code}</b> — 이 소리는 이제 회원님의 카드에 담겼어요. 언제든 다시 태그해 들으세요.</div>` : ''}
        <div class="infoline">
          <div><span>분위기</span>${s.tags.join(' · ')}</div>
          <div><span>좌표</span>${s.coords.lat.toFixed(3)}, ${s.coords.lng.toFixed(3)}</div>
          <div><span>이 바닷가의 것</span>${items.length}종</div>
        </div>
      </div>`;
    app.appendChild(hero);

    // 재생 버튼 (자동재생은 브라우저 정책상 탭 후 클릭 유도)
    const player = hero.querySelector('#player');
    const bp = hero.querySelector('#bigPlay');
    let started = false;
    bp.onclick = ()=>{
      if(!Ocean.isPlaying(s.id)) bp.textContent = '…';   // 로딩 표시
      Ocean.toggle(s, on=>{
        bp.textContent = on ? '❚❚' : '▶';
        player.classList.toggle('playing', on);
        if(on){ started = true; player.classList.remove('need-tap'); }
      });
    };

    // 소리가 흐르는 곳의 것
    const sec = document.createElement('section');
    sec.className='block';
    sec.innerHTML = `<div class="wrap">
      <div class="sec-head"><div>
        <h2>이 소리가 흐르는 곳의 것</h2>
        <p>${s.region.spot}의 파도가 흐르는 바닷가에서 자랐습니다. 상품을 누르면 판매처로 이동합니다.</p>
      </div></div>
      <div class="prod-grid" id="items"></div>
    </div>`;
    app.appendChild(sec);

    const box = sec.querySelector('#items');
    if(items.length){ items.forEach(l=>box.appendChild(UI.productCard(l))); }
    else box.innerHTML = `<p class="muted">이 바닷가의 것을 준비 중입니다. 곧 만나요 🌊</p>`;

    // 다른 소리
    const more = document.createElement('section');
    more.className='block'; more.style.background='#fff'; more.style.borderTop='1px solid var(--line)';
    more.innerHTML = `<div class="wrap"><div class="sec-head"><div><h2>다른 소리</h2></div>
      <a class="btn btn-line btn-sm" href="index.html#sounds">전체 →</a></div>
      <div class="sound-grid" id="more"></div></div>`;
    app.appendChild(more);
    const mg = more.querySelector('#more');
    BUNKER.SOUNDS.filter(x=>x.id!==s.id).slice(0,4).forEach(x=>mg.appendChild(UI.soundCard(x)));

    // NFC 로 들어온 경우: 소리 자동 재생 시도. 브라우저가 막으면(특히 iOS)
    // 재생버튼을 펄스시켜 '탭해서 듣기'를 유도한다.
    setTimeout(()=>{
      if(U.qs('autoplay')==='1'){ bp.click(); }
      setTimeout(()=>{ if(!started) player.classList.add('need-tap'); }, 500);
    }, 300);
  }
</script>
</body>
</html>
