<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>상품 · 벙커마켓</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="nav">
  <div class="wrap">
    <a class="brand" href="index.html"><span class="dot"></span>벙커마켓</a>
    <nav>
      <a href="index.html#sounds">소리</a>
      <a href="catalog.html">마켓</a>
      <a href="nfc.html">NFC 카드</a>
    </nav>
  </div>
</header>

<main id="app" class="wrap" style="padding:40px 22px 70px"></main>

<footer class="site"><div class="wrap">
  <div class="col"><div class="brand" style="font-size:20px"><span class="dot" style="background:var(--tide-lite);box-shadow:none"></span> 벙커마켓</div>
    <p style="font-size:14px">소리가 흐르는 곳.</p></div>
  <div class="col"><h4>마켓</h4><a href="catalog.html">전체 상품</a><a href="nfc.html">NFC 카드</a></div>
  <div class="col"><h4>문의</h4><a href="mailto:play@soundb.kr">play@soundb.kr</a></div>
</div></footer>

<script src="js/data.js"></script>
<script src="js/ocean.js"></script>
<script src="js/app.js"></script>
<script>
  const l = BUNKER.LISTINGS.find(x=>x.id===U.qs('p'));
  const app = document.getElementById('app');

  if(!l){ app.innerHTML=`<p class="muted">상품을 찾을 수 없어요. <a href="catalog.html">마켓으로</a></p>`; }
  else {
    const s = U.soundById(l.soundId);
    const cat = U.category(l.category);
    document.title = `${l.title} · 벙커마켓`;

    app.innerHTML = `
      <a class="muted" href="catalog.html" style="font-size:14px">← 마켓</a>
      <div class="detail-cols" style="margin-top:18px" id="cols">
        <div class="prod-thumb" style="background:${U.grad(s.tone.hue)};border-radius:var(--radius);aspect-ratio:1;position:relative">
          <span class="cat">${cat.icon} ${cat.label}</span>
          <span style="font-size:96px">${U.emoji(l)}</span>
        </div>
        <div>
          <div class="from" style="color:var(--tide);font-size:13px;margin-bottom:10px">🌊 <a href="sound.html?s=${s.id}"><b>${s.title}</b></a> 소리가 흐르는 곳</div>
          <h1 class="serif" style="font-size:34px;letter-spacing:-.01em">${l.title}</h1>
          <p class="muted" style="margin-top:6px">${l.producer}</p>
          <div class="serif" style="font-size:30px;margin:18px 0">${
            (cat.mode==='inquiry' || U.hasLink(l))
              ? `${U.krw(l.price)} <span class="muted" style="font-family:var(--sans);font-size:15px">/ ${l.unit}</span>`
              : `<span class="muted" style="font-family:var(--sans);font-size:17px">가격·재고는 판매처에서 확인해주세요</span>`
          }</div>
          <p style="font-size:16px">${l.short}</p>
          <p class="muted" style="margin-top:12px">${l.story}</p>

          <!-- 소리 미리듣기 -->
          <button class="btn btn-line" id="listen" style="margin-top:20px">▶ 이 바닷가의 소리 듣기</button>

          <div id="action" style="margin-top:24px"></div>
        </div>
      </div>
      <div id="inquiry"></div>`;

    // 소리 듣기 (누르면 즉시 로딩 표시 → 재생 상태 반영)
    const lb = document.getElementById('listen');
    lb.onclick=()=>{
      if(!Ocean.isPlaying(s.id)) lb.innerHTML = '… 소리 여는 중';
      Ocean.toggle(s, on=>lb.innerHTML = on ? '❚❚ 재생 중…' : '▶ 이 바닷가의 소리 듣기');
    };

    // 구매/문의 액션 (카테고리별 분기)
    const action = document.getElementById('action');
    if(cat.mode !== 'inquiry'){
      // 농산물 등: 외부 판매처로 이동
      const noteText = U.hasLink(l)
        ? '판매처(외부 사이트)로 이동합니다.'
        : '아직 지정 판매처가 없어 네이버쇼핑 검색으로 연결됩니다.';
      action.innerHTML = `
        <a class="btn btn-accent" href="${U.buyLink(l)}" target="_blank" rel="noopener" style="display:inline-block">${U.buyLabel(l)}</a>
        <p class="muted" style="font-size:13px;margin-top:10px">${noteText}</p>`;
    } else {
      // 문의형 (소리 좋은 집 등)
      action.innerHTML = `<a class="btn btn-accent" href="#inquiry">${cat.cta} ↓</a>`;
      document.getElementById('inquiry').innerHTML = `
        <section class="block" style="padding-top:50px">
          <div class="sec-head"><div><h2>${cat.cta}</h2><p>담당 큐레이터가 확인 후 방문·구매 절차를 안내드립니다.</p></div></div>
          <form class="form-card" id="inqForm">
            <label>이름</label><input required name="name" placeholder="성함">
            <label>연락처</label><input required name="phone" placeholder="010-0000-0000">
            <label>희망 내용</label><textarea name="msg" rows="3" placeholder="방문 희망일, 궁금한 점을 적어주세요"></textarea>
            <button class="btn btn-accent" style="margin-top:18px;width:100%">문의 보내기</button>
          </form>
        </section>`;
      document.getElementById('inqForm').onsubmit=(e)=>{
        e.preventDefault();
        const f=new FormData(e.target);
        const body=`이름: ${f.get('name')}\n연락처: ${f.get('phone')}\n희망 내용: ${f.get('msg')||'-'}\n상품: ${l.title}`;
        location.href=`mailto:play@soundb.kr?subject=${encodeURIComponent('[문의] '+l.title)}&body=${encodeURIComponent(body)}`;
        UI.toast('메일 앱이 열려요. 보내기를 눌러주세요 🌊');
      };
    }
  }
</script>
</body>
</html>
